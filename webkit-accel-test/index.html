<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Juice Test</title>
  <style>
    body {
      background: #222;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    
    h2 {
      margin-bottom: 100px;
      color: #0f0;
    }

    .juicy__bounce {
      font-size: 8rem;
      animation-duration: 1s;
      animation-iteration-count: infinite;
      animation-name: bounce;
      transform-origin: center bottom;
    }

    /* Adapted from juice.css */
    @keyframes bounce {
      from, 53%, to {
        animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1);
        transform: translateY(0px);
      }
      30%, 43% {
        animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06);
        transform: translateY(-150px) scaleY(1.1);
      }
      70% {
        animation-timing-function: cubic-bezier(0.755, 0.05, 0.855, 0.06);
        transform: translateY(-75px) scaleY(1.05);
      }
      80% {
        transition-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1);
        transform: translateY(0px) scaleY(0.95);
      }
      90% {
        transform: translateY(-10px) scaleY(1.02);
      }
    }
  </style>
</head>
<body>
  <h2>Hardware Acceleration Test</h2>
  <div class="juicy__bounce">🍎</div>
</body>
</html>
