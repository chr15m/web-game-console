<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>R36S Web Console Menu</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 25px;
            margin: 0;
        }
        h1 { font-size: 3em; margin-bottom: 25px; }
        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .menu-item {
            font-size: 2em;
            padding: 15px 40px;
            border: 3px solid transparent;
            border-radius: 10px;
            transition: all 0.1s;
            background-color: #333;
            width: 60%;
        }
        .selected {
            border-color: lime;
            color: lime;
            background-color: #444;
            transform: scale(1.05);
        }
        .hidden { display: none !important; }
        /* Grid UI Styles */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            width: 680px;
            margin: 20px auto;
        }
        #picker-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 360px;
            margin: 20px auto;
        }
        .grid-cell, .picker-cell {
            width: 70px;
            height: 70px;
            background: #333;
            border: 3px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            cursor: pointer;
        }
        .grid-cell.highlight {
            border-color: #0a0;
            background: #131;
        }
        .grid-cell.active, .picker-cell.active {
            border-color: lime;
            background: #444;
        }
        #match-container {
            margin-top: 20px;
            padding: 15px;
            border: 3px solid transparent;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #222;
        }
        #match-container.active {
            border-color: lime;
            background: #333;
        }
        #match-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
        }
        .match-cell {
            width: 40px;
            height: 40px;
            background: #111;
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        #instructions {
            margin-top: 50px;
            color: #888;
            font-size: 1.2em;
        }
    </style>
</head>
<body tabindex="0">
    <h1>Select Demo</h1>

    <!-- Main Menu -->
    <div id="main-menu" class="menu">
        <div class="menu-item selected" data-action="gamecode">Enter gamecode</div>
        <div class="menu-item" data-action="tests">Tests</div>
    </div>

    <!-- Gamecode Screen -->
    <div id="gamecode-screen" class="hidden">
        <h2 id="gamecode-title">Enter Game Code</h2>
        <div id="grid-container">
            <!-- 16 cells generated by JS -->
        </div>
        <div id="picker-container" class="hidden">
            <!-- 16 emojis generated by JS -->
        </div>
        <div id="match-container" class="hidden">
            <h3 style="margin: 0 0 10px 0;">Matching Game Found:</h3>
            <div id="match-grid"></div>
            <div style="margin-top: 10px; color: lime;">Press A/X to Play</div>
        </div>
    </div>

    <!-- Tests Submenu -->
    <div id="tests-menu" class="menu hidden">
        <div class="menu-item selected" data-href="basic-gamepad.html">Gamepad Test</div>
        <div class="menu-item" data-href="basic-webaudio.html">Web Audio Test</div>
        <div class="menu-item" data-href="basic-webgl.html">WebGL Test</div>
        <div class="menu-item" data-href="basic-platformer.html">Platformer Test</div>
        <div class="menu-item" data-href="basic-storage.html">Storage Test</div>
        <div class="menu-item" data-href="basic-nostr.html">Nostr Test</div>
    </div>

    <div id="instructions">Use D-Pad / Left Stick to navigate.<br>Press A/X to select.<br>Press Y to go Home.</div>

    <script>
        document.body.focus();
        window.addEventListener('blur', () => console.log('DEBUG: Window lost focus'));
        window.addEventListener('focus', () => console.log('DEBUG: Window gained focus'));

        const SYMBOLS = ['⭐', '🍄', '🔥', '💧', '💎', '🍌', '🍎', '🍀', '👻', '💀', '👽', '🤖', '💣', '🔔', '❤️', '🌙'];
        let currentScreen = 'main'; // main, tests, gamecode, picker
        const mainItems = document.querySelectorAll('#main-menu .menu-item');
        const testsItems = document.querySelectorAll('#tests-menu .menu-item');
        let mainSelectedIndex = 0;
        let testsSelectedIndex = 0;

        // Grid state
        let gridCursor = { x: 0, y: 0 };
        let pickerCursor = { x: 0, y: 0 };
        let gridData = Array(16).fill(-1); // Indices into SYMBOLS, -1 is empty
        let mockMatchData = null;
        let gamecodeFocus = 'grid'; // 'grid' or 'match'

        let lastAxisX = 0;
        let lastAxisY = 0;
        let lastButtonPress = false;
        let lastDpadUp = false;
        let lastDpadDown = false;
        let lastDpadLeft = false;
        let lastDpadRight = false;
        let lastBackPress = false;
        let lastHomePress = false;

        function getActiveItems() {
            return currentScreen === 'main' ? mainItems : testsItems;
        }

        function getActiveSelectedIndex() {
            return currentScreen === 'main' ? mainSelectedIndex : testsSelectedIndex;
        }

        function setActiveSelectedIndex(idx) {
            if (currentScreen === 'main') mainSelectedIndex = idx;
            else testsSelectedIndex = idx;
        }

        function updateSelection() {
            const items = getActiveItems();
            const idx = getActiveSelectedIndex();
            items.forEach((item, i) => {
                if (i === idx) item.classList.add('selected');
                else item.classList.remove('selected');
            });
        }

        function initGrid() {
            const container = document.getElementById('grid-container');
            if (container.children.length === 0) {
                for (let i = 0; i < 16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    if (i < 5) cell.classList.add('highlight');
                    cell.id = `cell-${i}`;
                    container.appendChild(cell);
                }
            }
            const pContainer = document.getElementById('picker-container');
            if (pContainer.children.length === 0) {
                for (let i = 0; i < 16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'picker-cell';
                    cell.id = `picker-${i}`;
                    cell.textContent = SYMBOLS[i];
                    pContainer.appendChild(cell);
                }
            }
            updateGridUI();
        }

        function updateGridUI() {
            const isPicker = currentScreen === 'picker';
            document.getElementById('grid-container').classList.toggle('hidden', isPicker);
            document.getElementById('picker-container').classList.toggle('hidden', !isPicker);
            document.getElementById('gamecode-title').textContent = isPicker ? "Select Symbol" : "Enter Game Code";

            let first5Filled = true;
            for (let i = 0; i < 5; i++) {
                if (gridData[i] === -1) first5Filled = false;
            }

            if (first5Filled && !mockMatchData) {
                mockMatchData = Array(16).fill(0);
                for (let i = 0; i < 5; i++) mockMatchData[i] = gridData[i];
                for (let i = 5; i < 16; i++) mockMatchData[i] = Math.floor(Math.random() * 16);
            } else if (!first5Filled) {
                mockMatchData = null;
                if (gamecodeFocus === 'match') gamecodeFocus = 'grid';
            }

            const matchContainer = document.getElementById('match-container');
            if (mockMatchData && !isPicker) {
                matchContainer.classList.remove('hidden');
                matchContainer.classList.toggle('active', gamecodeFocus === 'match');
                const matchGrid = document.getElementById('match-grid');
                if (matchGrid.children.length === 0) {
                    for (let i = 0; i < 16; i++) {
                        const cell = document.createElement('div');
                        cell.className = 'match-cell';
                        matchGrid.appendChild(cell);
                    }
                }
                for (let i = 0; i < 16; i++) {
                    matchGrid.children[i].textContent = SYMBOLS[mockMatchData[i]];
                }
            } else {
                matchContainer.classList.add('hidden');
            }

            for (let i = 0; i < 16; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if (cell) {
                    cell.textContent = gridData[i] === -1 ? '' : SYMBOLS[gridData[i]];
                    cell.classList.toggle('active', !isPicker && gamecodeFocus === 'grid' && i === (gridCursor.y * 8 + gridCursor.x));
                }
            }
            for (let i = 0; i < 16; i++) {
                const pCell = document.getElementById(`picker-${i}`);
                if (pCell) {
                    pCell.classList.toggle('active', isPicker && i === (pickerCursor.y * 4 + pickerCursor.x));
                }
            }
        }

        function switchToScreen(screen) {
            currentScreen = screen;
            document.getElementById('main-menu').classList.toggle('hidden', screen !== 'main');
            document.getElementById('tests-menu').classList.toggle('hidden', screen !== 'tests');
            document.getElementById('gamecode-screen').classList.toggle('hidden', screen !== 'gamecode' && screen !== 'picker');
            
            if (screen === 'gamecode' || screen === 'picker') initGrid();
            updateSelection();
        }

        function executeAction() {
            if (currentScreen === 'gamecode') {
                if (gamecodeFocus === 'match') {
                    alert("Game Verified and Launched! (Mock)");
                    switchToScreen('main');
                } else {
                    switchToScreen('picker');
                }
                return;
            }
            if (currentScreen === 'picker') {
                const symbolIdx = pickerCursor.y * 4 + pickerCursor.x;
                const gridIdx = gridCursor.y * 8 + gridCursor.x;
                gridData[gridIdx] = symbolIdx;
                
                if (gridIdx < 15) {
                    gridCursor.x = (gridIdx + 1) % 8;
                    gridCursor.y = Math.floor((gridIdx + 1) / 8);
                }
                switchToScreen('gamecode');
                return;
            }

            const items = getActiveItems();
            const idx = getActiveSelectedIndex();
            const item = items[idx];

            if (currentScreen === 'main') {
                const action = item.getAttribute('data-action');
                if (action === 'tests') {
                    switchToScreen('tests');
                } else if (action === 'gamecode') {
                    switchToScreen('gamecode');
                }
            } else if (currentScreen === 'tests') {
                const href = item.getAttribute('data-href');
                if (href) {
                    window.location.href = href;
                }
            }
        }

        function handleBack() {
            if (currentScreen === 'gamecode') {
                if (gamecodeFocus === 'match') {
                    gamecodeFocus = 'grid';
                    updateGridUI();
                } else {
                    switchToScreen('main');
                }
            } else if (currentScreen === 'picker') {
                switchToScreen('gamecode');
            } else if (currentScreen !== 'main') {
                switchToScreen('main');
            }
        }

        let pollCount = 0;
        function poll() {
            pollCount++;
            if (pollCount % 180 === 0) {
                const pads = navigator.getGamepads();
                console.log('DEBUG: Poll active. Pad0 ID:', pads[0] ? pads[0].id : 'None');
            }
            const pads = navigator.getGamepads();
            const gp = pads[0];

            if (gp) {
                const axisX = gp.axes[0] || 0;
                const axisY = gp.axes[1] || 0;
                const dpadUp = gp.buttons.length > 12 ? gp.buttons[12].pressed : false;
                const dpadDown = gp.buttons.length > 13 ? gp.buttons[13].pressed : false;
                const dpadLeft = gp.buttons.length > 14 ? gp.buttons[14].pressed : false;
                const dpadRight = gp.buttons.length > 15 ? gp.buttons[15].pressed : false;

                // Vertical Navigation
                if ((axisY > 0.5 || dpadDown) && lastAxisY <= 0.5 && !lastDpadDown) {
                    if (currentScreen === 'gamecode') {
                        if (gamecodeFocus === 'grid') {
                            if (gridCursor.y === 0) {
                                gridCursor.y = 1;
                            } else if (gridCursor.y === 1 && mockMatchData) {
                                gamecodeFocus = 'match';
                            }
                        }
                        updateGridUI();
                    } else if (currentScreen === 'picker') {
                        pickerCursor.y = (pickerCursor.y + 1) % 4;
                        updateGridUI();
                    } else if (currentScreen === 'main' || currentScreen === 'tests') {
                        const items = getActiveItems();
                        const idx = getActiveSelectedIndex();
                        setActiveSelectedIndex((idx + 1) % items.length);
                        updateSelection();
                    }
                } else if ((axisY < -0.5 || dpadUp) && lastAxisY >= -0.5 && !lastDpadUp) {
                    if (currentScreen === 'gamecode') {
                        if (gamecodeFocus === 'match') {
                            gamecodeFocus = 'grid';
                            gridCursor.y = 1;
                        } else if (gamecodeFocus === 'grid') {
                            if (gridCursor.y === 1) gridCursor.y = 0;
                        }
                        updateGridUI();
                    } else if (currentScreen === 'picker') {
                        pickerCursor.y = (pickerCursor.y - 1 + 4) % 4;
                        updateGridUI();
                    } else if (currentScreen === 'main' || currentScreen === 'tests') {
                        const items = getActiveItems();
                        const idx = getActiveSelectedIndex();
                        setActiveSelectedIndex((idx - 1 + items.length) % items.length);
                        updateSelection();
                    }
                }

                // Horizontal Navigation
                if ((axisX > 0.5 || dpadRight) && lastAxisX <= 0.5 && !lastDpadRight) {
                    if (currentScreen === 'gamecode' && gamecodeFocus === 'grid') {
                        gridCursor.x = (gridCursor.x + 1) % 8;
                        updateGridUI();
                    } else if (currentScreen === 'picker') {
                        pickerCursor.x = (pickerCursor.x + 1) % 4;
                        updateGridUI();
                    }
                } else if ((axisX < -0.5 || dpadLeft) && lastAxisX >= -0.5 && !lastDpadLeft) {
                    if (currentScreen === 'gamecode' && gamecodeFocus === 'grid') {
                        gridCursor.x = (gridCursor.x - 1 + 8) % 8;
                        updateGridUI();
                    } else if (currentScreen === 'picker') {
                        pickerCursor.x = (pickerCursor.x - 1 + 4) % 4;
                        updateGridUI();
                    }
                }

                lastAxisX = axisX;
                lastAxisY = axisY;
                lastDpadUp = dpadUp;
                lastDpadDown = dpadDown;
                lastDpadLeft = dpadLeft;
                lastDpadRight = dpadRight;

                // B button (bottom) = index 0
                const bPressed = gp.buttons[0] && gp.buttons[0].pressed;
                // Y button (left) = index 2
                const yPressed = gp.buttons[2] && gp.buttons[2].pressed;
                // Select button (A=1, X=3)
                const selectPressed = (gp.buttons[1] && gp.buttons[1].pressed) ||
                                      (gp.buttons[3] && gp.buttons[3].pressed);

                if (yPressed && !lastHomePress) {
                    handleBack();
                }
                lastHomePress = yPressed;

                if (bPressed && !lastBackPress) {
                    handleBack();
                }
                lastBackPress = bPressed;

                if (selectPressed && !lastButtonPress) {
                    executeAction();
                }
                lastButtonPress = selectPressed;
            }
            requestAnimationFrame(poll);
        }

        poll();
    </script>
</body>
</html>
