<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>R36S Web Console Menu</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
            margin: 0;
        }
        h1 { font-size: 3em; margin-bottom: 50px; }
        #menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .menu-item {
            font-size: 2em;
            padding: 15px 40px;
            border: 3px solid transparent;
            border-radius: 10px;
            transition: all 0.1s;
            background-color: #333;
            width: 60%;
        }
        .selected {
            border-color: lime;
            color: lime;
            background-color: #444;
            transform: scale(1.05);
        }
        #instructions {
            margin-top: 50px;
            color: #888;
            font-size: 1.2em;
        }
    </style>
</head>
<body tabindex="0">
    <h1>Select Demo</h1>
    <div id="menu">
        <div class="menu-item selected" data-href="basic-gamepad.html">Gamepad Test</div>
        <div class="menu-item" data-href="basic-webaudio.html">Web Audio Test</div>
        <div class="menu-item" data-href="basic-webgl.html">WebGL Test</div>
        <div class="menu-item" data-href="basic-platformer.html">Platformer Test</div>
    </div>
    <div id="instructions">Use D-Pad (Up/Down) / Left Stick to navigate.<br>Press A/B/X to select.</div>

    <script>
        document.body.focus();
        
        const items = document.querySelectorAll('.menu-item');
        let selectedIndex = 0;
        let lastAxisY = 0;
        let lastButtonPress = false;
        let lastDpadUp = false;
        let lastDpadDown = false;

        function updateSelection() {
            items.forEach((item, i) => {
                if (i === selectedIndex) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function poll() {
            const pads = navigator.getGamepads();
            const gp = pads[0];
            
            if (gp) {
                // Axis navigation (Left Stick Y is usually axis 1)
                const axisY = gp.axes[1] || 0;
                
                // D-Pad buttons (8=Up, 9=Down on R36S)
                const dpadUp = gp.buttons.length > 8 ? gp.buttons[8].pressed : false;
                const dpadDown = gp.buttons.length > 9 ? gp.buttons[9].pressed : false;

                if ((axisY > 0.5 || dpadDown) && lastAxisY <= 0.5 && !lastDpadDown) {
                    selectedIndex = (selectedIndex + 1) % items.length;
                    updateSelection();
                } else if ((axisY < -0.5 || dpadUp) && lastAxisY >= -0.5 && !lastDpadUp) {
                    selectedIndex = (selectedIndex - 1 + items.length) % items.length;
                    updateSelection();
                }
                
                lastAxisY = axisY;
                lastDpadUp = dpadUp;
                lastDpadDown = dpadDown;

                // Button press (A=1, B=0, X=2)
                const buttonPressed = [0, 1, 2].some(idx => gp.buttons[idx] && gp.buttons[idx].pressed);
                if (buttonPressed && !lastButtonPress) {
                    window.location.href = items[selectedIndex].getAttribute('data-href');
                    return; // Stop polling to prevent double triggers during navigation
                }
                lastButtonPress = buttonPressed;
            }
            requestAnimationFrame(poll);
        }
        
        poll();
    </script>
</body>
</html>
