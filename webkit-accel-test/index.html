<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Audio Test</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
            margin-top: 100px;
        }
        h1 { font-size: 3em; }
        #status { font-size: 1.5em; color: yellow; margin-top: 20px; }
    </style>
</head>
<body tabindex="0">
    <h1>Web Audio API Test</h1>
    <div id="status">Press any button on the gamepad to play audio...</div>

    <script>
        document.body.focus();

        let audioPlayed = false;

        window.addEventListener("gamepadconnected", (e) => {
            console.log("Gamepad connected:", e.gamepad);
            
            if (!audioPlayed) {
                audioPlayed = true;
                document.getElementById("status").textContent = "Playing audio sequence...";
                document.getElementById("status").style.color = "lime";
                playAudioSequence();
            }
        });

        function playAudioSequence() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.type = 'square';
            
            // Connect nodes
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            
            // Sequence of rising frequencies
            osc.frequency.setValueAtTime(440, now);        // A4
            osc.frequency.setValueAtTime(554.37, now + 0.1); // C#5
            osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
            osc.frequency.setValueAtTime(880, now + 0.3);    // A5

            // Volume envelope to avoid clicking
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.1, now + 0.02);
            gainNode.gain.setValueAtTime(0.1, now + 0.38);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.4);

            // Start and stop
            osc.start(now);
            osc.stop(now + 0.4);

            // Reset UI after playing
            setTimeout(() => {
                document.getElementById("status").textContent = "Audio finished. Refresh to play again.";
                document.getElementById("status").style.color = "#888";
            }, 500);
        }
    </script>
</body>
</html>
