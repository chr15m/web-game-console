<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>R36S Web Console Menu</title>
    <link rel="stylesheet" href="common.css">
    <script src="gamepad.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
</head>
<body tabindex="0">
    <h1>Select Demo</h1>

    <!-- Main Menu -->
    <div id="main-menu" class="menu">
        <div class="menu-item selected" data-href="app-gameloader.html">Enter gamecode</div>
        <div class="menu-item" data-action="tests">Tests</div>
        <div class="menu-item" data-href="app-wifi.html">Wi-Fi Settings</div>
        <div class="menu-item disabled" data-action="update" id="update-btn">Console up to date</div>
    </div>

    <!-- Tests Submenu -->
    <div id="tests-menu" class="menu hidden">
        <div class="menu-item selected" data-href="basic-gamepad.html">Gamepad Test</div>
        <div class="menu-item" data-href="basic-webaudio.html">Web Audio Test</div>
        <div class="menu-item" data-href="basic-webgl.html">WebGL Test</div>
        <div class="menu-item" data-href="basic-platformer.html">Platformer Test</div>
        <div class="menu-item" data-href="basic-storage.html">Storage Test</div>
        <div class="menu-item" data-href="basic-nostr.html">Nostr Test</div>
    </div>

    <div id="instructions" style="margin-top: 50px; color: #888; font-size: 1.2em;">Use D-Pad / Left Stick to navigate.<br>Press A/X to select.<br>Press Y to go Home.</div>

    <script>
        let systemApi = null;
        let updateAvailable = false;

        function pollForUpdates() {
            if (!systemApi) return;
            systemApi.check_update(function(responseStr) {
                try {
                    const response = JSON.parse(responseStr);
                    const btn = document.getElementById('update-btn');
                    if (response.code === 0 && response.update_available) {
                        updateAvailable = true;
                        btn.classList.remove('disabled');
                        btn.innerText = "Update Console (New Version!)";
                    } else {
                        updateAvailable = false;
                        btn.classList.add('disabled');
                        btn.innerText = "Console up to date";
                    }
                } catch (e) {}
            });
        }

        if (typeof QWebChannel !== 'undefined') {
            new QWebChannel(qt.webChannelTransport, function (channel) {
                systemApi = channel.objects.systemApi;
                // Check immediately, then every 10 seconds
                pollForUpdates();
                setInterval(pollForUpdates, 10000);
            });
        }

        document.body.focus();

        let currentScreen = 'main'; // main, tests
        const mainItems = document.querySelectorAll('#main-menu .menu-item');
        const testsItems = document.querySelectorAll('#tests-menu .menu-item');
        let mainSelectedIndex = 0;
        let testsSelectedIndex = 0;

        function getActiveItems() {
            return currentScreen === 'main' ? mainItems : testsItems;
        }

        function getActiveSelectedIndex() {
            return currentScreen === 'main' ? mainSelectedIndex : testsSelectedIndex;
        }

        function setActiveSelectedIndex(idx) {
            if (currentScreen === 'main') mainSelectedIndex = idx;
            else testsSelectedIndex = idx;
        }

        function updateSelection() {
            const items = getActiveItems();
            const idx = getActiveSelectedIndex();
            items.forEach((item, i) => {
                if (i === idx) item.classList.add('selected');
                else item.classList.remove('selected');
            });
        }

        function switchToScreen(screen) {
            currentScreen = screen;
            document.getElementById('main-menu').classList.toggle('hidden', screen !== 'main');
            document.getElementById('tests-menu').classList.toggle('hidden', screen !== 'tests');
            updateSelection();
        }

        function executeAction() {
            const items = getActiveItems();
            const idx = getActiveSelectedIndex();
            const item = items[idx];

            if (currentScreen === 'main') {
                const action = item.getAttribute('data-action');
                const href = item.getAttribute('data-href');
                if (action === 'tests') {
                    switchToScreen('tests');
                } else if (action === 'update') {
                    if (systemApi && updateAvailable) {
                        item.innerText = "Applying update & restarting...";
                        systemApi.update_system(function(responseStr) {
                            // If it succeeds, the console will restart.
                            // If it fails, we just reset the text.
                            try {
                                const response = JSON.parse(responseStr);
                                if (response.code !== 0) {
                                    item.innerText = "Update failed";
                                    setTimeout(pollForUpdates, 2000);
                                }
                            } catch (e) {
                                item.innerText = "Update failed";
                                setTimeout(pollForUpdates, 2000);
                            }
                        });
                    }
                } else if (href) {
                    window.location.href = href;
                }
            } else if (currentScreen === 'tests') {
                const href = item.getAttribute('data-href');
                if (href) {
                    window.location.href = href;
                }
            }
        }

        function handleBack() {
            if (currentScreen !== 'main') {
                switchToScreen('main');
            }
        }

        const gamepad = new GamepadInput({
            onUp: () => {
                const items = getActiveItems();
                const idx = getActiveSelectedIndex();
                setActiveSelectedIndex((idx - 1 + items.length) % items.length);
                updateSelection();
            },
            onDown: () => {
                const items = getActiveItems();
                const idx = getActiveSelectedIndex();
                setActiveSelectedIndex((idx + 1) % items.length);
                updateSelection();
            },
            onAction: () => {
                executeAction();
            },
            onBack: () => {
                handleBack();
            },
            onHome: () => {
                handleBack();
            }
        });
        gamepad.start();
    </script>
</body>
</html>
