<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
          --fg: #e8e4d8;
          --bg: #161616;
          --shade: #889;
          --error-bg: #782828;
          --radius: 4px;
          --content-width: 800px;
        }

        html {
          font-size: 1.25rem;
          box-sizing: border-box;
          height: 100%;
        }

        *, ::after, ::before {
          box-sizing: inherit;
        }

        body {
          margin: 0;
          background: var(--bg);
          color: var(--fg);
          font-family: Helvetica, Arial, sans-serif;
          padding: 1em;
          height: 100%;
        }

        footer {
          text-align: center;
          padding: 2em 0px;
        }

        #app {
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          gap: 1em;
          min-height: 100%;
        }

        a { color: var(--fg); }

        .logo-icon {
          vertical-align: middle;
          display: inline-block;
          width: 24px;
          height: 24px;
        }

        body header, body main, body footer {
          margin: 0px auto;
          padding-left: 10px;
          padding-right: 10px;
          width: 100%;
        }

        body main {
          max-width: 100%;
          width: var(--content-width);
          flex-grow: 1;
        }

        body > header {
          padding-top: 1rem;
          padding-bottom: 1rem;
          font-size: 1.2em;
        }

        h2 { font-size: 1.5em; }
        h3 { font-size: 1.17em; }

        button {
          display: inline-block;
          vertical-align: middle;
          padding: .2rem .5rem;
          font-size: 1rem;
          margin-bottom: .5rem;
          background: var(--fg);
          color: var(--bg);
          border: .1rem solid var(--fg);
          border-radius: var(--radius);
          cursor: pointer;
        }

        button:hover {
          opacity: 0.9;
        }

        button[type="reset"] {
          background: transparent;
          color: var(--fg);
        }

        button:disabled {
          cursor: not-allowed; 
          background: var(--shade);
          border: 2px solid var(--shade);
          color: var(--bg);
        }

        label {
          display: block;
          font-weight: bold;
          margin-bottom: .4rem;
        }

        input[type="file"] {
          box-sizing: inherit;
          padding: .5rem .5rem;
          width: 100%;
          font-size: 1rem;
          color: var(--fg);
          background-color: var(--bg);
          border: .1rem solid var(--fg);
          border-radius: var(--radius);
          margin-bottom: .8rem;
        }

        table {
          width: 100%;
          border-spacing: 0;
        }

        td, th { padding: .4rem; }
        th { border-bottom: .1rem solid var(--fg); text-align: left; }
        td { border-bottom: .05rem solid var(--fg); }

        .spread {
          width: 100%;
          display: flex;
          justify-content: space-between;
        }

        action-buttons {
          display: flex;
          justify-content: end;
          gap: 1em;
          align-items: center;
        }

        action-buttons svg {
          display: block;
          width: 24px;
          height: 24px;
        }

        .icon-sm { width: 20px; height: 20px; }

        .error {
          background-color: var(--error-bg);
          padding: 0.5em 1em;
          border-radius: var(--radius);
        }

        .clickable { cursor: pointer; }

        dialog {
          background: var(--bg);
          color: var(--fg);
          border: .1rem solid var(--fg);
          border-radius: var(--radius);
          padding: 1.5em;
          max-width: 400px;
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          margin: 0;
        }

        .dialog-actions {
          text-align: right;
          margin-top: 1.5em;
        }

        .game-code-display { font-size: 2rem; letter-spacing: 4px; background: #000; padding: 1rem; text-align: center; border-radius: var(--radius); margin: 1rem 0; }

        [data-notification-text] {
          position: relative;
        }

        [data-notification-text].notify::before {
          content: attr(data-notification-text);
          position: absolute;
          bottom: 100%;
          left: 50%;
          transform: translateX(-50%);
          background-color: rgba(255,255,255,0.9);
          color: #000;
          padding: 0.2rem 0.5rem;
          font-size: 0.8rem;
          border-radius: var(--radius);
          white-space: nowrap;
          pointer-events: none;
          z-index: 100;
        }

        .history-table td { vertical-align: middle; }
        .plus-btn-container { text-align: right; margin-top: 2rem; }
        .plus-btn { font-size: 1.5rem; padding: 0.5rem 1.5rem; border-radius: var(--radius); line-height: 1; }
        .copyable { cursor: pointer; }
        .copyable:hover { text-decoration: underline; }
    </style>
    <script type="application/x-scittle" src="main.cljs"></script>
</head>
<body>
