<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WGC Publisher</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@latest/dist/scittle.min.js" type="application/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@latest/dist/scittle.promesa.min.js" type="application/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/scittle@latest/dist/scittle.reagent.min.js" type="application/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools@2.17.2/lib/nostr.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #111; color: #eee; }
        .card { background: #222; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:disabled { background: #555; cursor: not-allowed; }
        input[type="file"] { margin: 20px 0; }
        .game-code { font-size: 32px; letter-spacing: 5px; background: #000; padding: 20px; text-align: center; border-radius: 8px; margin: 20px 0; }
        .error { color: #ff6b6b; }
    </style>
    <script type="application/x-scittle" src="main.cljs"></script>
</head>
<body>
    <div id="app">Loading...</div>
</body>
</html>
